services:
  - type: web
    name: line-bill-bot
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: OCR_SPACE_API_KEY
        sync: false
      - key: OCR_SPACE_LANGUAGE
        value: auto
      - key: OCR_SPACE_ENGINE
        value: "2"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SHEET_NAME
        value: Bills
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: LIFF_ID
        sync: false
      - key: TZ
        value: Asia/Bangkok
