<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แก้ไขข้อมูลบิล</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,'Segoe UI',Roboto,'Sarabun',sans-serif;background:#eef2f7;color:#0f172a}
  .wrap{max-width:540px;margin:0 auto;padding:16px 14px 28px}
  h1{font-size:19px;margin:4px 0 14px}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:16px;margin-bottom:14px}
  .card h2{font-size:14px;margin:0 0 12px;color:#4A90D9;font-weight:800;letter-spacing:.02em}
  .field{margin-bottom:12px}
  .field:last-child{margin-bottom:0}
  label{display:block;font-size:13px;font-weight:700;margin-bottom:5px;color:#334155}
  input,select{width:100%;padding:12px;border:1.5px solid #cbd5e1;border-radius:11px;font-size:16px;background:#fff}
  input:focus,select:focus{outline:none;border-color:#4A90D9}
  .row{display:flex;gap:10px}.row>.field{flex:1}
  .hint{font-size:11.5px;color:#94a3b8;margin-top:3px}
  .bar{display:flex;gap:10px;margin-top:6px}
  button{flex:1;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:800;cursor:pointer}
  .save{background:#3BA55C;color:#fff}.cancel{background:#e2e8f0;color:#334155;flex:0 0 96px}
  .msg{text-align:center;padding:48px 20px;color:#64748b}
  .ok{text-align:center;padding:60px 20px;color:#16a34a;font-size:20px;font-weight:800}
  .ok span{display:block;font-size:14px;color:#64748b;font-weight:400;margin-top:8px}
</style>
</head>
<body>
<div class="wrap" id="form" style="display:none">
  <h1>✏️ แก้ไขข้อมูลบิล</h1>

  <div class="card">
    <h2>ข้อมูลทั่วไป</h2>
    <div class="row">
      <div class="field"><label>วันที่</label><input id="date" type="date"></div>
      <div class="field"><label>เลขที่บิล</label><input id="bill_no" placeholder="1195"></div>
    </div>
    <div class="field"><label>ร้านสาขา</label>
      <input id="branch" list="branches" placeholder="เลือกหรือพิมพ์">
      <datalist id="branches">
        <option>ยะลา</option><option>ปัตตานี</option><option>หาดใหญ่</option><option>เบตง</option>
        <option>ธารโต</option><option>สายบุรี</option><option>ตากใบ</option><option>หนองจิก</option>
        <option>สุไหงปาดี</option><option>สุไหงโกลก</option><option>มายอ</option><option>ตันหยงมัส</option>
        <option>ระนอง</option><option>นิบงบารู</option><option>เจาะกือแย</option><option>ทรายขาว</option>
        <option>ตลาดเก่า</option><option>นราธิวาส</option><option>รือเสาะ</option><option>กะสือ</option>
      </datalist>
    </div>
    <div class="field"><label>เจ้าของงาน / ชื่องาน</label><input id="job_owner" placeholder="เช่น คุณซ้อง"></div>
    <div class="row">
      <div class="field"><label>บริษัทขนส่ง</label>
        <input id="courier" list="couriers" placeholder="เลือกหรือพิมพ์">
        <datalist id="couriers"><option>PAT</option><option>ภัทรขนส่ง</option><option>ไชยรักษ์เอ็กซ์เพรส</option></datalist>
      </div>
      <div class="field"><label>วิธีเก็บเงิน</label>
        <select id="payment"><option value="">-</option><option>เก็บปลายทาง</option><option>เก็บต้นทาง</option><option>เครดิต</option></select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>รายละเอียดสินค้า</h2>
    <div class="field"><label>บริษัทผ้า</label>
      <input id="fabric_company" list="fabrics" placeholder="เลือกหรือพิมพ์">
      <datalist id="fabrics"><option>พีผ้าม่าน</option><option>หยาซิง</option><option>Nava</option><option>A&amp;T</option></datalist>
    </div>
    <div class="field"><label>ประเภทสินค้า</label>
      <select id="item_type" onchange="onType()">
        <option value="ผ้าม่าน">ผ้าม่าน</option>
        <option value="อุปกรณ์">อุปกรณ์</option>
        <option value="อื่นๆ">อื่นๆ (กรอกเอง)</option>
      </select>
    </div>
    <div class="field" id="row_code"><label>รหัสผ้า</label><input id="fabric_code" placeholder="เช่น NV-204"></div>
    <div class="field" id="row_item"><label id="lbl_item">ชื่ออุปกรณ์</label><input id="item" placeholder="เช่น รางผ้าม่าน"></div>
    <div class="row">
      <div class="field"><label>จำนวน</label><input id="qty" inputmode="decimal" placeholder="1"></div>
      <div class="field"><label>หน่วย</label>
        <input id="unit" list="units" placeholder="เลือกหรือพิมพ์">
        <datalist id="units"><option>ห่อ</option><option>ม้วน</option><option>เมตร</option><option>ชิ้น</option></datalist>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>ราคา</h2>
    <div class="field"><label>ค่าขนส่ง (บาท)</label><input id="shipping_cost" inputmode="decimal" placeholder="150"></div>
  </div>

  <div class="bar">
    <button class="cancel" onclick="closeWin()">ปิด</button>
    <button class="save" id="saveBtn" onclick="save()">💾 บันทึกการแก้ไข</button>
  </div>
</div>
<div class="msg" id="msg">กำลังโหลด…</div>
<div class="ok" id="ok" style="display:none">✅ อัปเดตแล้ว<span>กลับไปที่แชท ตรวจข้อมูลอีกครั้งแล้วกด "ยืนยัน"</span></div>

<script>
const FIELDS=['date','branch','job_owner','fabric_company','courier','bill_no','payment','item_type','item','fabric_code','qty','unit','shipping_cost'];
let token='';
function getToken(){
  const q=new URLSearchParams(location.search);
  if(q.get('t')) return q.get('t');
  const st=q.get('liff.state');
  if(st){ try{ return new URLSearchParams(st.replace(/^\?/,'')).get('t')||''; }catch(e){} }
  return '';
}
function setVal(id,v){ const el=document.getElementById(id); if(el) el.value=(v==null?'':v); }
function getVal(id){ const el=document.getElementById(id); return el?el.value.trim():''; }

// แสดงช่องตามประเภทสินค้า
function onType(){
  const t=getVal('item_type');
  const code=document.getElementById('row_code');
  const item=document.getElementById('row_item');
  if(t==='ผ้าม่าน'){ code.style.display='block'; item.style.display='none'; }
  else { code.style.display='none'; item.style.display='block';
    document.getElementById('lbl_item').textContent = (t==='อุปกรณ์') ? 'ชื่ออุปกรณ์' : 'รายการ (กรอกเอง)'; }
}

async function start(){
  token=getToken();
  if(!token){ document.getElementById('msg').textContent='ไม่พบ token — กรุณาเปิดผ่านปุ่มแก้ไขในไลน์'; return; }
  try{
    const r=await fetch('/api/bill?t='+encodeURIComponent(token));
    const data=await r.json();
    if(!data.ok){ document.getElementById('msg').textContent=data.error||'โหลดข้อมูลไม่ได้'; return; }
    const b=data.bill||{};
    FIELDS.forEach(f=>setVal(f,b[f]));
    if(!getVal('item_type')) setVal('item_type','ผ้าม่าน');
    onType();
    document.getElementById('msg').style.display='none';
    document.getElementById('form').style.display='block';
  }catch(e){ document.getElementById('msg').textContent='ผิดพลาด: '+e.message; }
}
async function save(){
  const btn=document.getElementById('saveBtn'); btn.disabled=true; btn.textContent='กำลังบันทึก…';
  const fields={}; FIELDS.forEach(f=>fields[f]=getVal(f));
  if(fields.item_type==='ผ้าม่าน' && !fields.item) fields.item='ผ้าม่าน';
  try{
    const r=await fetch('/api/bill',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({t:token,fields})});
    const data=await r.json();
    if(data.ok){ document.getElementById('form').style.display='none'; document.getElementById('ok').style.display='block'; }
    else { alert(data.error||'บันทึกไม่สำเร็จ'); btn.disabled=false; btn.textContent='💾 บันทึกการแก้ไข'; }
  }catch(e){ alert('ผิดพลาด: '+e.message); btn.disabled=false; btn.textContent='💾 บันทึกการแก้ไข'; }
}
function closeWin(){ history.back(); }
start();
</script>
</body>
</html>
